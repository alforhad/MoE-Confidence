hydra:
  run:
    dir: ./experiments/${scenario}/${dataset}-${method}_breeds
  job:
    chdir: true

  job_logging:
    version: 1
    formatters:
      simple:
        format: '%(message)s'

class_order: ""
dataset_root: ""
workdir: ""
log_path: "metrics.json"
model_name: "ViT-B/16"
prompt_template: "a bad photo of a {}."
batch_size: 64
scenario: "class"
dataset: "breeds"
epsilon: 0.000001
zeta: 0.01
conf_threshold: 95
tau_UB: 1.0
tau_LB: 0.8
weight_decay: 0.0
method: "MoE_Confidence"
lr: 1e-3
ls: 0.0
