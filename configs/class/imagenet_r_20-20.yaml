hydra:
  run:
    dir: ./experiments/${scenario}/${dataset}_${initial_increment}-${increment}-${method}
  job:
    chdir: true

  job_logging:
    version: 1
    formatters:
      simple:
        format: '%(message)s'

class_order: ""
dataset_root: "data"
workdir: ""
log_path: "metrics.json"
checkpoint_dir: "checkpoints"
train_only: false
eval_only: false
model_name: "ViT-B/16"
prompt_template: "a good photo of a {}."
batch_size: 64
increment: ${initial_increment}
initial_increment: 20  
scenario: "class"
dataset: "imagenet_R"
epsilon: 0.000001
zeta: 0.01
conf_threshold: 90
tau_UB: 1.0
tau_LB: 0.8
weight_decay: 0.0
method: "MoE_Confidence"
lr: 1e-3
ls: 0.0


